apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegiscore-web
  namespace: aegiscore
  labels:
    app.kubernetes.io/name: aegiscore-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegiscore-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegiscore-web
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
      containers:
        - name: web
          # Replace with your registry + immutable tag or digest.
          # IMPORTANT: Never use 'latest' in production. Use specific version tags or SHA256 digests.
          # Example: ghcr.io/example/aegiscore-web:v1.2.3 or ghcr.io/example/aegiscore-web@sha256:abc123...
          image: ghcr.io/example/aegiscore-web:v0.0.0-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop: ["ALL"]
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.example.com"
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
