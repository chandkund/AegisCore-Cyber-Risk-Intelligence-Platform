apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnops-web
  namespace: vulnops
  labels:
    app.kubernetes.io/name: vulnops-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vulnops-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vulnops-web
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
      containers:
        - name: web
          image: ghcr.io/example/vulnops-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop: ["ALL"]
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.example.com"
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
