# Requires External Secrets Operator: https://external-secrets.io/
# Adjust SecretStore/ClusterSecretStore name and remoteRef keys to your vault (Vault, AWS SM, Azure KV, GCP SM).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vulnops-api-secret
  namespace: vulnops
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: example-secret-store
    kind: ClusterSecretStore
  target:
    name: vulnops-api-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: vulnops/database-url
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: vulnops/jwt-secret-key
