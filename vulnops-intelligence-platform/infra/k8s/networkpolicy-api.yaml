# Restrict API pods: ingress only from ingress controller namespace; egress to DNS + PostgreSQL.
# Adjust namespace labels, postgres selector, or add ipBlock for managed RDS per environment.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegiscore-api
  namespace: aegiscore
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: aegiscore-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    # Optional: in-cluster Prometheus scraping same port (cannot restrict HTTP path here).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Uncomment for external managed PostgreSQL (replace with provider CIDRs).
    # - to:
    #     - ipBlock:
    #         cidr: 10.0.0.0/8
    #   ports:
    #     - protocol: TCP
    #       port: 5432
