apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnops-api
  namespace: vulnops
  labels:
    app.kubernetes.io/name: vulnops-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vulnops-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vulnops-api
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      containers:
        - name: api
          # Replace with your registry + digest or immutable tag.
          image: ghcr.io/example/vulnops-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: vulnops-api-config
            - secretRef:
                name: vulnops-api-secret
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
