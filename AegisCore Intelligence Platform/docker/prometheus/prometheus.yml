# Prometheus Configuration
# AegisCore Intelligence Platform - Metrics Collection
# ==============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: aegiscore
    replica: '{{.ExternalURL}}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus itself
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ---------------------------------------------------------------------------
  # API Application Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'aegiscore-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    
  # ---------------------------------------------------------------------------
  # Node Exporter - System Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    
  # ---------------------------------------------------------------------------
  # PostgreSQL Exporter
  # ---------------------------------------------------------------------------
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s
    
  # ---------------------------------------------------------------------------
  # Redis Exporter
  # ---------------------------------------------------------------------------
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
    
  # ---------------------------------------------------------------------------
  # Nginx Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    scrape_interval: 15s
    
  # ---------------------------------------------------------------------------
  # Celery Workers
  # ---------------------------------------------------------------------------
  - job_name: 'celery'
    static_configs:
      - targets: ['celery:5555']
    scrape_interval: 30s

# Storage configuration
storage:
  tsdb:
    retention.time: 15d
    retention.size: 50GB
    wal-compression: true
