# Production Docker Compose Configuration
# AegisCore Intelligence Platform - Production Deployment
# ==============================================================================

version: "3.9"

services:
  # -----------------------------------------------------------------------------
  # PostgreSQL Database
  # -----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aegiscore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegiscore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-aegiscore}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - aegiscore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegiscore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # -----------------------------------------------------------------------------
  # Redis Cache
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aegiscore-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - aegiscore-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # -----------------------------------------------------------------------------
  # Backend API
  # -----------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    container_name: aegiscore-api
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/${POSTGRES_DB:-aegiscore}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-generate_strong_secret_key_for_production}
      JWT_SECRET: ${JWT_SECRET:-generate_strong_jwt_secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-generate_32_byte_encryption_key}
      
      # Uploads
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE_MB: 50
      
      # App Settings
      APP_ENV: production
      LOG_LEVEL: info
      DEBUG: "false"
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW: 60
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-https://aegiscore.io}
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - aegiscore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -----------------------------------------------------------------------------
  # Frontend
  # -----------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: runner
    container_name: aegiscore-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.aegiscore.io}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://aegiscore.io}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    networks:
      - aegiscore-network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -----------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # -----------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: aegiscore-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - aegiscore-network
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # -----------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # -----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: aegiscore-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - aegiscore-network
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # -----------------------------------------------------------------------------
  # Grafana - Visualization
  # -----------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: aegiscore-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.aegiscore.io}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - aegiscore-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # -----------------------------------------------------------------------------
  # Node Exporter - Host Metrics
  # -----------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: aegiscore-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - aegiscore-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  # -----------------------------------------------------------------------------
  # ClamAV - Virus Scanning
  # -----------------------------------------------------------------------------
  clamav:
    image: clamav/clamav:latest
    container_name: aegiscore-clamav
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
      - uploads_data:/uploads:ro
    ports:
      - "3310:3310"
    networks:
      - aegiscore-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # -----------------------------------------------------------------------------
  # Celery Worker - Background Tasks
  # -----------------------------------------------------------------------------
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    container_name: aegiscore-celery
    restart: unless-stopped
    command: celery -A app.core.celery worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/${POSTGRES_DB:-aegiscore}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-generate_strong_secret_key_for_production}
      APP_ENV: production
      LOG_LEVEL: info
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs
    networks:
      - aegiscore-network
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # -----------------------------------------------------------------------------
  # Celery Beat - Scheduled Tasks
  # -----------------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    container_name: aegiscore-celery-beat
    restart: unless-stopped
    command: celery -A app.core.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/${POSTGRES_DB:-aegiscore}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-generate_strong_secret_key_for_production}
      APP_ENV: production
      LOG_LEVEL: info
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs
    networks:
      - aegiscore-network
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  aegiscore-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  clamav_data:
    driver: local
