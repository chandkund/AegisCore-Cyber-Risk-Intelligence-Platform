# Requires External Secrets Operator: https://external-secrets.io/
# Adjust SecretStore/ClusterSecretStore name and remoteRef keys to your vault (Vault, AWS SM, Azure KV, GCP SM).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aegiscore-api-secret
  namespace: aegiscore
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: example-secret-store
    kind: ClusterSecretStore
  target:
    name: aegiscore-api-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: aegiscore/database-url
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: aegiscore/jwt-secret-key
