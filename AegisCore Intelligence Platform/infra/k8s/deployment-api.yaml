apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegiscore-api
  namespace: aegiscore
  labels:
    app.kubernetes.io/name: aegiscore-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegiscore-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegiscore-api
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      containers:
        - name: api
          # Replace with your registry + immutable tag or digest.
          # IMPORTANT: Never use 'latest' in production. Use specific version tags or SHA256 digests.
          # Example: ghcr.io/example/aegiscore-api:v1.2.3 or ghcr.io/example/aegiscore-api@sha256:abc123...
          image: ghcr.io/example/aegiscore-api:v0.0.0-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: aegiscore-api-config
            - secretRef:
                name: aegiscore-api-secret
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
